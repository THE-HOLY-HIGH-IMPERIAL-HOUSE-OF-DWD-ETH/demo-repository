  #!/usr/bin/env python3
  import json, os, sys
  def run_signature_verification():
      target_path = "./combined-transaction-presentation.min.json"
      if not os.path.exists(target_path): sys.exit(1)
      with open(target_path, "r") as f: payload = json.load(f)
      assigned_signer = payload.get("paymentClearance", {}).get("sourceWallet")
      mock_jws = payload.get("proof", {}).get("jws", "")
      if "MockMasterSignatureString" in mock_jws and assigned_signer.startswith("did:xp:imperial-we:0xEF8a"):
          print("✅ Verification Successful: Clearance Level Alpha-XP Authorized.")
      else:
          print("❌ Verification Failed."); sys.exit(1)
  if __name__ == "__main__": run_signature_verification()

