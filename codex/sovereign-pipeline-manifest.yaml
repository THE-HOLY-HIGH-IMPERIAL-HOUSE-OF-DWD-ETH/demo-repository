  #!/usr/bin/env python3
  import os
  from http.server import SimpleHTTPRequestHandler, HTTPServer
  class SovereignGatewayHandler(SimpleHTTPRequestHandler):
      def end_headers(self):
          self.send_header('Access-Control-Allow-Origin', '*')
          self.send_header('Content-Type', 'application/ld+json')
          super().end_headers()
  def boot_gateway_node():
      os.chdir('/app/demo-sandbox')
      HTTPServer(('', 8080), SovereignGatewayHandler).serve_forever()
  if __name__ == '__main__': boot_gateway_node()

