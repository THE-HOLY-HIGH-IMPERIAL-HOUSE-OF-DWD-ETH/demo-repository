---
layer: "4. SYSTEM SECURITY & GATEWAY"
component: "Secure Production Edge Reverse Proxy"
target_file: "/infrastructure/reverse-proxy.conf"
format: "NGINX Reverse Proxy Configuration Suite"
configuration_block: |
  server {
      listen 443 ssl http2;
      server_name api.xp.reserve;
      ssl_certificate /etc/ssl/certs/public-key-infrastructure.pem;
      ssl_certificate_key /etc/ssl/private/production-private-key.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_ciphers HIGH:!aNULL:!MD5;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      location / {
          proxy_pass http://soverain-api-gateway:8080;
          proxy_set_header Host $host;
      }
  }

