format: "Docker Build Specification"
instructions: |
  FROM python:3.11-slim
  WORKDIR /app
  COPY demo-sandbox/ /app/demo-sandbox/
  COPY app.py /app/app.py
  EXPOSE 8080
  CMD ["python3", "app.py"]
