name: XP Apex Certificate Schema Validation & Pages Deployment CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Sets necessary token permissions for native GitHub Pages delivery streams
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent racing condition conflicts
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Check Out Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set Up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Validation Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests jsonschema xrpl-py qrcode pillow
        npm ci

    - name: Run Schema and Toolkit Validation Pipeline
      run: |
        npm run validate:schema
        npm run validate:typescript

    # ============================================================================
    # ARTIFACT COMPILATION LAYER FOR GITHUB PAGES PUBLISHING
    # ============================================================================
    - name: Construct Production Build Directory
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        mkdir -p dist-public
        # Compile dashboard as main landing page and checkout as secondary view
        cp dashboard.html dist-public/index.html
        cp index.html dist-public/checkout.html
        cp sovereign_apex_commerce_qr.png dist-public/sovereign_apex_commerce_qr.png

    - name: Configure GitHub Pages Infrastructure Setup
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/configure-pages@v5

    - name: Pack Production Static Web Artifacts
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist-public'

    - name: Deploy Compiled Sovereign Dashboard to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      id: deployment
      uses: actions/deploy-pages@v4

docker compose up -d --build
