name: XP Reserve Credential Retrieval
on: [push]

jobs:
  retrieve-vcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute VCI Handshake
        run: |
          # 1. Exchange Pre-Authorized Code for Access Token
          RESPONSE=$(curl -s -X POST https://xp.reserve \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:pre-authorized_code" \
            -d "pre-authorized_code=MPFXPC-C1-CBWEAECZ2CZQE-EDJEWF7A9DIWENPEJ-5GECA4FKECRZC1")

          ACCESS_TOKEN=$(echo $RESPONSE | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" == "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Error: Failed to retrieve access token. Response: $RESPONSE"
            exit 1
          fi

          # 2. Retrieve the JWT Verifiable Credentials
          curl -s -X POST https://xp.reserve \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "format": "jwt_vc_json",
              "types": ["⚜️XP_SOVEREIGN_DESPOTIC_MONARCH", "Gold_Silver_Covenant"]
            }' > credentials_output.json

          echo "Success: Credentials saved to credentials_output.json"
