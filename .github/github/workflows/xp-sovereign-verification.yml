name: XP Sovereign Verification ⚜️

on:
  pull_request:
    branches: [ "production" ]
  push:
    branches: [ "production" ]

jobs:
  verify-sovereignty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install ethers ts-node typescript

      - name: Execute Autonomous Deep Scan
        run: npx ts-node tools/xp-sovereign-toolkit.ts --verify

      - name: Verification Result
        if: success()
        run: echo "✅ ROOT DEMO CODEX: 100% LIVE & SOVEREIGN-CERTIFIED"
