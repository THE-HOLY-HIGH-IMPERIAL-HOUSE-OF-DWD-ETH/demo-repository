name: CI Diagnostic
on:
  push:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SOVERAIN QR Diagnostics
        run: |
          echo "Running SOVERAIN QR System Diagnostics..."
          test -f README.md
          test -f SOVEREIGN_CLEARANCE_DECREE.md
          test -d identity
          test -d verification
          test -d qr
          test -d clearance
          test -d archive
          echo "Diagnostics Complete."
